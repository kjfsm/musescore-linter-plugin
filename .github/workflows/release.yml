name: リリース

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: リリース
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - name: Node.js のセットアップ
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: ビルド
        run: pnpm run build

      - name: Changeset アクションの実行
        id: changesets
        uses: changesets/action@v1
        with:
          title: "バージョンアップ"
          commit: "chore: バージョンアップ"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: パッケージング (ZIP 作成)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: pnpm run package

      - name: GitHub Release の作成
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          ZIP="musescore-linter-plugin-${VERSION}.zip"
          LATEST_ZIP="musescore-linter-plugin.zip"

          if gh release view "${TAG}" > /dev/null 2>&1; then
            echo "リリース ${TAG} は既に存在します。スキップします。"
            exit 0
          fi

          gh release create "${TAG}" "${ZIP}" "${LATEST_ZIP}" --title "${TAG}" --generate-notes
          echo "リリース ${TAG} を作成しました。"
