name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 環境情報
        run: |
          set -x
          node --version
          pnpm --version
          pnpm config get store-dir
          df -h .
          free -h

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile --prefer-offline --reporter=default
        timeout-minutes: 5

      - name: Biome チェック
        run: pnpm lint
        timeout-minutes: 2

      - name: 型チェック (musescore-api)
        run: pnpm --filter @musescore-linter/musescore-api run typecheck
        timeout-minutes: 3

      - name: 型チェック (core)
        run: pnpm --filter @musescore-linter/core run typecheck
        timeout-minutes: 3

      - name: 型チェック (checkers)
        run: pnpm --filter @musescore-linter/checkers run typecheck
        timeout-minutes: 3

      - name: テスト (カバレッジ計測)
        run: pnpm test:coverage -- --reporter=verbose
        timeout-minutes: 5

      - name: ビルド
        run: pnpm build
        timeout-minutes: 3

      - name: Codecov へのカバレッジ送信
        if: always()
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
